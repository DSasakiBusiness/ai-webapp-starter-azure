name: CD - Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-ai-webapp-staging
  AZURE_LOCATION: japaneast
  ACR_NAME: aiwebappstaging
  API_IMAGE: ai-webapp-api
  WEB_IMAGE: ai-webapp-web

jobs:
  build-and-push:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push API Image
        run: |
          docker build -f apps/api/Dockerfile \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:latest

      - name: Build & Push Web Image
        run: |
          docker build -f apps/web/Dockerfile \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.WEB_IMAGE }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.WEB_IMAGE }}:latest

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Container Apps
        run: |
          az containerapp update \
            --name ai-webapp-api-staging \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy Web to Azure Container Apps
        run: |
          az containerapp update \
            --name ai-webapp-web-staging \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.WEB_IMAGE }}:${{ github.sha }}

      - name: Run DB Migration
        run: |
          az containerapp exec \
            --name ai-webapp-api-staging \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --command "npx prisma migrate deploy"
